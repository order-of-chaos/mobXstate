name: Deploy Pages

on:
  push:
    branches: [master]

concurrency:
  group: deploy-pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Library
        run: npm run build

      - name: Build Pages
        run: npm run pages:build

      - name: Deploy To gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist-pages
          force_orphan: true
          enable_jekyll: false
